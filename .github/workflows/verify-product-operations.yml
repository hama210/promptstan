name: Verify PromptStan Product Operations

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-phase-9a:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Run the complete test suite
        run: npm test

      - name: Rehearse the full D1 migration chain
        run: npx wrangler d1 migrations apply promptstan-db --local

      - name: Build frontend
        run: npm run build

      - name: Validate Worker bundle
        run: npx wrangler deploy --dry-run

      - name: Wait for the Phase 9 preview
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          branch_slug="$(printf '%s' "$HEAD_BRANCH" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9-]+/-/g; s/^-+|-+$//g')"
          APP_BASE="https://${branch_slug}-promptstan-api.hhhh46529.workers.dev"
          printf '%s' "$APP_BASE" >/tmp/app-base.txt

          for attempt in $(seq 1 36); do
            health="$(curl -fsSL "$APP_BASE/api/health" 2>/dev/null || true)"
            printf '%s\n' "$health"
            if printf '%s' "$health" | grep -F '"product_operations":"product-operations-v1"' >/dev/null; then
              exit 0
            fi
            sleep 5
          done

          echo "Phase 9 preview did not become available at $APP_BASE" >&2
          exit 1

      - name: Verify Phase 9 routes stay protected
        run: |
          set -euo pipefail
          APP_BASE="$(cat /tmp/app-base.txt)"
          for endpoint in \
            '/api/admin/operations/status' \
            '/api/admin/operations/moderation' \
            '/api/admin/operations/retention'; do
            code="$(curl -sS -o /tmp/unauthorized.json -w '%{http_code}' "$APP_BASE$endpoint")"
            test "$code" = "401"
            grep -F '"error":"Unauthorized"' /tmp/unauthorized.json
          done
