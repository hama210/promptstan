name: Deploy PromptStan to Cloudflare

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: promptstan-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Validate Worker bundle
        run: npx wrangler deploy --dry-run

      - name: Verify Cloudflare authentication
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          wranglerVersion: "4"
          command: whoami

      - name: Capture production D1 schema and starter seed
        id: seed
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set +e
          npx wrangler d1 execute promptstan-db --remote --command="PRAGMA table_info(categories); PRAGMA table_info(prompts);" > d1-schema.txt 2>&1
          schema_status=$?
          npx wrangler d1 execute promptstan-db --remote --file=database/migrations/0003_seed_starter_prompt.sql > d1-seed.txt 2>&1
          seed_status=$?
          cat d1-schema.txt
          cat d1-seed.txt
          echo "schema_exit_code=$schema_status" >> "$GITHUB_OUTPUT"
          echo "seed_exit_code=$seed_status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload production D1 diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: promptstan-production-d1-seed
          path: |
            d1-schema.txt
            d1-seed.txt
          if-no-files-found: error
          retention-days: 1

      - name: Require the production D1 seed
        env:
          SCHEMA_EXIT_CODE: ${{ steps.seed.outputs.schema_exit_code }}
          SEED_EXIT_CODE: ${{ steps.seed.outputs.seed_exit_code }}
        run: |
          test "$SCHEMA_EXIT_CODE" = "0"
          test "$SEED_EXIT_CODE" = "0"

      - name: Check ADMIN_TOKEN Worker secret
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if npx wrangler secret list | grep -F 'ADMIN_TOKEN'; then
            echo 'ADMIN_TOKEN is configured.'
          else
            echo '::warning::ADMIN_TOKEN is not configured. The public site works, but admin write actions remain locked.'
          fi

      - name: Verify live PromptStan deployment
        env:
          LIVE_BASE: https://promptstan-api.hhhh46529.workers.dev
        run: |
          set -euo pipefail

          health="$(curl -fsSL "$LIVE_BASE/api/health")"
          printf '%s' "$health" | grep -F '"ok":true'
          printf '%s' "$health" | grep -E '"image_provider":"(workers-ai|openai)"'

          status="$(curl -sS -o /tmp/admin-system.json -w '%{http_code}' "$LIVE_BASE/api/admin/system")"
          test "$status" = "401"
          grep -F '"error":"Unauthorized"' /tmp/admin-system.json

          html="$(curl -fsSL "$LIVE_BASE/admin")"
          asset="$(printf '%s' "$html" | grep -oE 'src="[^"]+\.js"' | head -n 1 | cut -d'"' -f2)"
          test -n "$asset"

          case "$asset" in
            http*) asset_url="$asset" ;;
            /*) asset_url="$LIVE_BASE$asset" ;;
            *) asset_url="$LIVE_BASE/$asset" ;;
          esac

          curl -fsSL "$asset_url" -o /tmp/promptstan-app.js
          grep -F 'Cloudflare & Image Repair' /tmp/promptstan-app.js

  deploy:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Apply D1 migrations and deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          wranglerVersion: "4"
          preCommands: wrangler d1 migrations apply promptstan-db --remote
          command: deploy --keep-vars

      - name: Verify deployed image provider
        env:
          LIVE_BASE: https://promptstan-api.hhhh46529.workers.dev
        run: |
          set -euo pipefail
          curl -fsSL "$LIVE_BASE/api/health" | grep -E '"image_provider":"(workers-ai|openai)"'
