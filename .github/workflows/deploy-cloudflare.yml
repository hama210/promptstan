name: Deploy PromptStan to Cloudflare

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: promptstan-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Validate Worker bundle
        run: npx wrangler deploy --dry-run

      - name: Verify Cloudflare authentication
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          wranglerVersion: "4"
          command: whoami

      - name: Verify live PromptStan deployment
        env:
          LIVE_BASE: https://promptstan-api.hhhh46529.workers.dev
        run: |
          set -euo pipefail

          curl -fsSL "$LIVE_BASE/api/health" | grep -F '"ok":true'

          status="$(curl -sS -o /tmp/admin-system.json -w '%{http_code}' "$LIVE_BASE/api/admin/system")"
          test "$status" = "401"
          grep -F '"error":"Unauthorized"' /tmp/admin-system.json

          html="$(curl -fsSL "$LIVE_BASE/admin")"
          asset="$(printf '%s' "$html" | grep -oE 'src="[^"]+\.js"' | head -n 1 | cut -d'"' -f2)"
          test -n "$asset"

          case "$asset" in
            http*) asset_url="$asset" ;;
            /*) asset_url="$LIVE_BASE$asset" ;;
            *) asset_url="$LIVE_BASE/$asset" ;;
          esac

          curl -fsSL "$asset_url" -o /tmp/promptstan-app.js
          grep -F 'Cloudflare & Image Repair' /tmp/promptstan-app.js

  deploy:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Apply D1 migrations and deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          wranglerVersion: "4"
          preCommands: wrangler d1 migrations apply promptstan-db --remote
          command: deploy --keep-vars
