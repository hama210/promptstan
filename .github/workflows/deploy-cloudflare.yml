name: Deploy PromptStan to Cloudflare

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: promptstan-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Test Phase 6 content safety
        run: node scripts/test-phase6.mjs

      - name: Test Phase 6 scheduling
        run: node scripts/test-automation.mjs

      - name: Verify hourly automation trigger
        run: |
          grep -F '"crons": ["0 * * * *"]' wrangler.jsonc

      - name: Build frontend
        run: npm run build

      - name: Validate Worker bundle
        run: npx wrangler deploy --dry-run

      - name: Verify Cloudflare authentication
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          wranglerVersion: "4"
          command: whoami

      - name: Check ADMIN_TOKEN Worker secret
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if npx wrangler secret list | grep -F 'ADMIN_TOKEN'; then
            echo 'ADMIN_TOKEN is configured.'
          else
            echo '::warning::ADMIN_TOKEN is not configured. The public site works, but admin write actions remain locked.'
          fi

      - name: Verify live PromptStan deployment
        env:
          LIVE_BASE: https://promptstan-api.hhhh46529.workers.dev
        run: |
          set -euo pipefail

          health="$(curl -fsSL "$LIVE_BASE/api/health")"
          printf '%s' "$health" | grep -F '"ok":true'
          printf '%s' "$health" | grep -E '"image_provider":"(workers-ai|openai)"'

          status="$(curl -sS -o /tmp/admin-system.json -w '%{http_code}' "$LIVE_BASE/api/admin/system")"
          test "$status" = "401"
          grep -F '"error":"Unauthorized"' /tmp/admin-system.json

          html="$(curl -fsSL "$LIVE_BASE/admin")"
          asset="$(printf '%s' "$html" | grep -oE 'src="[^"]+\.js"' | head -n 1 | cut -d'"' -f2)"
          test -n "$asset"

          case "$asset" in
            http*) asset_url="$asset" ;;
            /*) asset_url="$LIVE_BASE$asset" ;;
            *) asset_url="$LIVE_BASE/$asset" ;;
          esac

          curl -fsSL "$asset_url" -o /tmp/promptstan-app.js
          grep -F 'Cloudflare & Library Repair' /tmp/promptstan-app.js

  deploy:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Test Phase 6 content safety
        run: node scripts/test-phase6.mjs

      - name: Test Phase 6 scheduling
        run: node scripts/test-automation.mjs

      - name: Verify hourly automation trigger
        run: |
          grep -F '"crons": ["0 * * * *"]' wrangler.jsonc

      - name: Build frontend
        run: npm run build

      - name: Apply D1 migrations and deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          wranglerVersion: "4"
          preCommands: wrangler d1 migrations apply promptstan-db --remote
          command: deploy --keep-vars

      - name: Bootstrap and verify the live prompt library
        env:
          LIVE_BASE: https://promptstan-api.hhhh46529.workers.dev
        run: |
          set -euo pipefail

          for attempt in $(seq 1 24); do
            health="$(curl -fsSL "$LIVE_BASE/api/health" 2>/dev/null || true)"
            if printf '%s' "$health" | grep -F '"launch_phase":"shareable-prompts-v1"' >/dev/null \
              && printf '%s' "$health" | grep -F '"content_scale":"content-safety-v1"' >/dev/null \
              && printf '%s' "$health" | grep -F '"automation":"dynamic-schedule-v1"' >/dev/null; then
              break
            fi
            if [ "$attempt" -eq 24 ]; then
              echo 'The Phase 6 Worker was not observed in production.' >&2
              exit 1
            fi
            sleep 5
          done

          curl -fsSL -X POST \
            -H 'x-promptstan-bootstrap: empty-library-v1' \
            "$LIVE_BASE/api/bootstrap" | tee /tmp/bootstrap.json

          prompts="$(curl -fsSL "$LIVE_BASE/api/prompts")"
          printf '%s\n' "$prompts"
          PROMPTS="$prompts" node -e "const p=JSON.parse(process.env.PROMPTS); process.exit(Array.isArray(p)&&p.some(x=>x.slug)?0:1)"
