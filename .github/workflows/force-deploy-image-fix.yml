name: Force Deploy PromptStan Image Fix

on:
  push:
    branches:
      - agent/force-deploy-image-fix

permissions:
  contents: read

jobs:
  deploy-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Deploy current image fix to production
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set +e
          npx wrangler deploy --keep-vars > wrangler-deploy.txt 2>&1
          status=$?
          cat wrangler-deploy.txt
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload Wrangler deployment output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: promptstan-wrangler-deploy
          path: wrangler-deploy.txt
          if-no-files-found: error
          retention-days: 1

      - name: Require successful deployment
        env:
          DEPLOY_EXIT_CODE: ${{ steps.deploy.outputs.exit_code }}
        run: test "$DEPLOY_EXIT_CODE" = "0"

      - name: Verify the corrected Worker revision
        run: |
          set -euo pipefail
          for attempt in $(seq 1 18); do
            health="$(curl -fsS --retry 3 --retry-delay 2 https://promptstan-api.hhhh46529.workers.dev/api/health)"
            printf '%s\n' "$health"
            if printf '%s' "$health" | grep -F '"image_pipeline":"flux-sdxl-byte-array-v4"' >/dev/null; then
              exit 0
            fi
            sleep 5
          done
          echo 'The corrected Worker revision was not observed.' >&2
          exit 1

      - name: Queue and verify image repair
        run: |
          set -euo pipefail
          for attempt in $(seq 1 36); do
            body="$(curl -fsS --retry 3 --retry-delay 2 https://promptstan-api.hhhh46529.workers.dev/api/health/images)"
            printf '%s\n' "$body" | tee live-image-health.json

            if printf '%s' "$body" | grep -F '"image_status":"ready"' >/dev/null \
              && printf '%s' "$body" | grep -F '"has_before":1' >/dev/null \
              && printf '%s' "$body" | grep -F '"has_after":1' >/dev/null; then
              exit 0
            fi

            if printf '%s' "$body" | grep -F '"image_status":"failed"' >/dev/null \
              && ! printf '%s' "$body" | grep -E 'input tensor `image`|Input prompt contains NSFW content' >/dev/null; then
              echo 'The corrected pipeline returned a new error.' >&2
              exit 1
            fi

            sleep 10
          done

          echo 'Image generation did not finish within the verification window.' >&2
          exit 1

      - name: Upload final image health
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: promptstan-force-deploy-health
          path: live-image-health.json
          if-no-files-found: warn
          retention-days: 1
