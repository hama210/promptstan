name: Apply Phase 5 D1 Seed

on:
  push:
    branches:
      - agent/phase-5-production-verify

permissions:
  contents: read

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      SEED_REVISION: phase-5-v2

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Apply registered D1 migrations
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler d1 migrations apply promptstan-db --remote

      - name: Apply the idempotent starter seed
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "Applying $SEED_REVISION"
          npx wrangler d1 execute promptstan-db --remote --file database/migrations/0003_seed_starter_prompt.sql

      - name: Verify the production prompt
        env:
          LIVE_BASE: https://promptstan-api.hhhh46529.workers.dev
        run: |
          set -euo pipefail
          for attempt in $(seq 1 18); do
            prompts="$(curl -fsSL "$LIVE_BASE/api/prompts")"
            printf '%s\n' "$prompts"
            if PROMPTS="$prompts" node -e "const p=JSON.parse(process.env.PROMPTS); process.exit(Array.isArray(p)&&p.some(x=>x.slug)?0:1)"; then
              exit 0
            fi
            sleep 5
          done
          echo 'The starter prompt was not visible after seeding.' >&2
          exit 1
