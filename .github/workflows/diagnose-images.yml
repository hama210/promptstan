name: Verify PromptStan Prompt Pages

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-prompts:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Wait for the fixed Worker preview
        env:
          PRODUCTION_BASE: https://promptstan-api.hhhh46529.workers.dev
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail

          branch_slug="$(printf '%s' "$HEAD_BRANCH" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9-]+/-/g; s/^-+|-+$//g')"
          if [ -n "$branch_slug" ]; then
            APP_BASE="https://${branch_slug}-promptstan-api.hhhh46529.workers.dev"
          else
            APP_BASE="$PRODUCTION_BASE"
          fi
          printf '%s' "$APP_BASE" >/tmp/app-base.txt

          for attempt in $(seq 1 36); do
            health="$(curl -fsSL "$APP_BASE/api/health" 2>/dev/null || true)"
            printf '%s\n' "$health"
            if printf '%s' "$health" | grep -F '"launch_phase":"shareable-prompts-v1"' >/dev/null \
              && printf '%s' "$health" | grep -F '"growth_phase":"privacy-analytics-v1"' >/dev/null; then
              exit 0
            fi
            sleep 5
          done

          echo "The fixed PromptStan preview was not available at $APP_BASE" >&2
          exit 1

      - name: Verify admin CORS preflight
        run: |
          set -euo pipefail
          APP_BASE="$(cat /tmp/app-base.txt)"

          curl -sS -D /tmp/preflight-headers.txt -o /tmp/preflight-body.txt \
            -X OPTIONS "$APP_BASE/api/admin/analytics" \
            -H 'Origin: https://promptstan.pages.dev' \
            -H 'Access-Control-Request-Method: GET' \
            -H 'Access-Control-Request-Headers: authorization'

          grep -iF 'access-control-allow-origin: *' /tmp/preflight-headers.txt
          grep -iF 'access-control-allow-headers: content-type, authorization' /tmp/preflight-headers.txt
          grep -E '^HTTP/.* 204' /tmp/preflight-headers.txt

      - name: Verify the complete known prompt library
        run: |
          set -euo pipefail
          APP_BASE="$(cat /tmp/app-base.txt)"

          prompts="$(curl -fsSL "$APP_BASE/api/prompts")"
          printf '%s\n' "$prompts" | tee /tmp/preview-prompts.json
          PROMPTS="$prompts" node <<'NODE'
          const prompts = JSON.parse(process.env.PROMPTS || '[]');
          if (!Array.isArray(prompts) || prompts.length < 24) {
            throw new Error(`Expected at least 24 restored prompts, received ${prompts.length}`);
          }
          const prompt = prompts.find((item) => item.slug);
          require('fs').writeFileSync('/tmp/prompt-slug.txt', prompt.slug);
          require('fs').writeFileSync('/tmp/prompt-title.txt', prompt.title_ku || prompt.title_en || prompt.slug);
          NODE

      - name: Verify growth event ingestion and protection
        run: |
          set -euo pipefail
          APP_BASE="$(cat /tmp/app-base.txt)"
          slug="$(cat /tmp/prompt-slug.txt)"
          title="$(cat /tmp/prompt-title.txt)"

          curl -fsSL -X POST "$APP_BASE/api/share" \
            -H 'content-type: application/json' \
            --data "{\"slug\":\"$slug\",\"title\":\"$title\"}" \
            | tee /tmp/share-event.json
          grep -F '"ok":true' /tmp/share-event.json

          curl -fsSL -X POST "$APP_BASE/api/search-event" \
            -H 'content-type: application/json' \
            --data '{"query":"cinematic portrait","result_count":24}' \
            | tee /tmp/search-event.json
          grep -F '"ok":true' /tmp/search-event.json

          status="$(curl -sS -o /tmp/analytics-unauthorized.json -w '%{http_code}' "$APP_BASE/api/admin/analytics")"
          test "$status" = "401"
          grep -F '"error":"Unauthorized"' /tmp/analytics-unauthorized.json

      - name: Validate the preview prompt page, sitemap, and social image
        run: |
          set -euo pipefail
          APP_BASE="$(cat /tmp/app-base.txt)"
          slug="$(cat /tmp/prompt-slug.txt)"

          curl -fsSL "$APP_BASE/prompt/$slug" -o /tmp/prompt-page.html
          grep -F '<meta property="og:type" content="article"' /tmp/prompt-page.html
          grep -F '<meta property="og:image"' /tmp/prompt-page.html
          grep -F '<meta name="twitter:image"' /tmp/prompt-page.html
          grep -F '"@type":"CreativeWork"' /tmp/prompt-page.html
          grep -F "/prompt/$slug" /tmp/prompt-page.html

          social_image="$(grep -oE '<meta property="og:image" content="[^"]+"' /tmp/prompt-page.html | head -n 1 | sed -E 's/.*content="([^"]+)"/\1/')"
          test -n "$social_image"
          curl -fsSL -D /tmp/social-image-headers.txt "$social_image" -o /tmp/social-image
          grep -iE '^content-type: image/' /tmp/social-image-headers.txt
          test -s /tmp/social-image

          curl -fsSL "$APP_BASE/sitemap.xml" -o /tmp/sitemap.xml
          grep -F '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">' /tmp/sitemap.xml
          grep -F "/prompt/$slug" /tmp/sitemap.xml

      - name: Verify production D1 exposes the restored library
        env:
          PRODUCTION_BASE: https://promptstan-api.hhhh46529.workers.dev
        run: |
          set -euo pipefail
          slug="$(cat /tmp/prompt-slug.txt)"

          prompts="$(curl -fsSL "$PRODUCTION_BASE/api/prompts")"
          printf '%s\n' "$prompts"
          PROMPTS="$prompts" SLUG="$slug" node <<'NODE'
          const prompts = JSON.parse(process.env.PROMPTS || '[]');
          if (!Array.isArray(prompts) || prompts.length < 24) {
            throw new Error(`Production D1 exposes only ${prompts.length} prompts`);
          }
          if (!prompts.some((prompt) => prompt.slug === process.env.SLUG)) {
            throw new Error('Production D1 does not expose the restored prompt');
          }
          NODE

          curl -fsSL "$PRODUCTION_BASE/prompt/$slug" -o /tmp/production-prompt-page.html
          grep -F '<meta property="og:type" content="article"' /tmp/production-prompt-page.html
          grep -F '<meta property="og:image"' /tmp/production-prompt-page.html
          grep -F "/prompt/$slug" /tmp/production-prompt-page.html
          curl -fsSL "$PRODUCTION_BASE/sitemap.xml" | grep -F "/prompt/$slug"
