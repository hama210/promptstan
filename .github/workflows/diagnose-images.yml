name: Diagnose PromptStan Images

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Verify dedicated img2img branch preview
        env:
          PREVIEW_BASE: https://agent-final-img2img-fix-promptstan-api.hhhh46529.workers.dev
        run: |
          set -euo pipefail

          for attempt in $(seq 1 24); do
            health="$(curl -fsS --retry 3 --retry-delay 2 "$PREVIEW_BASE/api/health" || true)"
            printf '%s\n' "$health"
            if printf '%s' "$health" | grep -F '"image_pipeline":"flux-img2img-r2-v6"' >/dev/null; then
              break
            fi
            if [ "$attempt" -eq 24 ]; then
              echo 'The dedicated img2img preview revision was not observed.' >&2
              exit 1
            fi
            sleep 5
          done

          for attempt in $(seq 1 42); do
            body="$(curl -fsS --retry 3 --retry-delay 2 "$PREVIEW_BASE/api/health/images")"
            printf '%s\n' "$body" | tee live-image-health.json

            if printf '%s' "$body" | grep -F '"image_status":"ready"' >/dev/null \
              && printf '%s' "$body" | grep -F '"has_before":1' >/dev/null \
              && printf '%s' "$body" | grep -F '"has_after":1' >/dev/null; then
              echo 'PromptStan Before and After images are ready.'
              exit 0
            fi

            if printf '%s' "$body" | grep -F '"image_status":"failed"' >/dev/null \
              && ! printf '%s' "$body" | grep -E 'input tensor `image`|Input prompt contains NSFW content|Could not load image: 404|Could not load R2 image:' >/dev/null; then
              echo 'The dedicated img2img model returned a new error.' >&2
              exit 1
            fi

            sleep 10
          done

          echo 'Image generation did not finish within the verification window.' >&2
          exit 1

      - name: Upload image health
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: promptstan-image-diagnostics
          path: live-image-health.json
          if-no-files-found: warn
          retention-days: 1
