name: Verify PromptStan Images

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-images:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Verify prompt API and public image files
        env:
          LIVE_BASE: https://promptstan-api.hhhh46529.workers.dev
        run: |
          set -euo pipefail
          curl -fsSL "$LIVE_BASE/api/prompts" -o /tmp/prompts.json

          node <<'NODE'
          const fs = require('fs');
          const prompts = JSON.parse(fs.readFileSync('/tmp/prompts.json', 'utf8'));
          if (!Array.isArray(prompts)) throw new Error('Prompt API did not return an array');

          const prompt = prompts.find((item) => item.before_image_url && item.after_image_url);
          if (!prompt) throw new Error('No prompt has both Before and After images');

          const base = process.env.LIVE_BASE.replace(/\/$/, '');
          const absolute = (value) => /^https?:\/\//i.test(value)
            ? value
            : `${base}${value.startsWith('/') ? '' : '/'}${value}`;

          fs.writeFileSync('/tmp/before-url.txt', absolute(prompt.before_image_url));
          fs.writeFileSync('/tmp/after-url.txt', absolute(prompt.after_image_url));
          console.log(JSON.stringify({
            id: prompt.id,
            image_status: prompt.image_status,
            before_image_url: prompt.before_image_url,
            after_image_url: prompt.after_image_url
          }));
          NODE

          before_url="$(cat /tmp/before-url.txt)"
          after_url="$(cat /tmp/after-url.txt)"

          curl -fsSL -D /tmp/before-headers.txt "$before_url" -o /tmp/before-image
          curl -fsSL -D /tmp/after-headers.txt "$after_url" -o /tmp/after-image

          grep -iE '^content-type: image/' /tmp/before-headers.txt
          grep -iE '^content-type: image/' /tmp/after-headers.txt
          test -s /tmp/before-image
          test -s /tmp/after-image
