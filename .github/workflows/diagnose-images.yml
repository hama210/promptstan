name: Verify PromptStan Prompt Pages

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  seed-d1:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Apply the idempotent starter seed
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          wranglerVersion: "4"
          command: d1 execute promptstan-db --remote --file database/migrations/0003_seed_starter_prompt.sql

      - name: Verify D1 through Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          wranglerVersion: "4"
          command: d1 execute promptstan-db --remote --command="SELECT id, slug, image_status FROM prompts ORDER BY id DESC LIMIT 5"

  verify-prompts:
    needs: seed-d1
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Wait for the Phase 5 Worker preview
        env:
          PRODUCTION_BASE: https://promptstan-api.hhhh46529.workers.dev
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail

          branch_slug="$(printf '%s' "$HEAD_BRANCH" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9-]+/-/g; s/^-+|-+$//g')"
          if [ -n "$branch_slug" ]; then
            APP_BASE="https://${branch_slug}-promptstan-api.hhhh46529.workers.dev"
          else
            APP_BASE="$PRODUCTION_BASE"
          fi
          printf '%s' "$APP_BASE" >/tmp/app-base.txt

          for attempt in $(seq 1 36); do
            health="$(curl -fsSL "$APP_BASE/api/health" 2>/dev/null || true)"
            printf '%s\n' "$health"
            if printf '%s' "$health" | grep -F '"launch_phase":"shareable-prompts-v1"' >/dev/null; then
              exit 0
            fi
            sleep 5
          done

          echo "The Phase 5 preview revision was not available at $APP_BASE" >&2
          exit 1

      - name: Select a live or fallback prompt
        env:
          PRODUCTION_BASE: https://promptstan-api.hhhh46529.workers.dev
        run: |
          set -euo pipefail
          curl -fsSL "$PRODUCTION_BASE/api/prompts" -o /tmp/prompts.json

          node <<'NODE'
          const fs = require('fs');
          const prompts = JSON.parse(fs.readFileSync('/tmp/prompts.json', 'utf8'));
          if (!Array.isArray(prompts)) throw new Error('Prompt API did not return an array');

          const prompt = prompts.find((item) => item.slug);
          const slug = prompt?.slug || 'prompt-1';
          fs.writeFileSync('/tmp/prompt-slug.txt', slug);
          console.log(JSON.stringify({ source: prompt ? 'd1' : 'fallback', slug }));
          NODE

      - name: Validate the preview prompt page, sitemap, and social image
        run: |
          set -euo pipefail
          APP_BASE="$(cat /tmp/app-base.txt)"
          slug="$(cat /tmp/prompt-slug.txt)"

          curl -fsSL "$APP_BASE/prompt/$slug" -o /tmp/prompt-page.html
          grep -F '<meta property="og:type" content="article"' /tmp/prompt-page.html
          grep -F '<meta property="og:image"' /tmp/prompt-page.html
          grep -F '<meta name="twitter:image"' /tmp/prompt-page.html
          grep -F '"@type":"CreativeWork"' /tmp/prompt-page.html
          grep -F "/prompt/$slug" /tmp/prompt-page.html

          social_image="$(grep -oE '<meta property="og:image" content="[^"]+"' /tmp/prompt-page.html | head -n 1 | sed -E 's/.*content="([^"]+)"/\1/')"
          test -n "$social_image"
          curl -fsSL -D /tmp/social-image-headers.txt "$social_image" -o /tmp/social-image
          grep -iE '^content-type: image/' /tmp/social-image-headers.txt
          test -s /tmp/social-image

          curl -fsSL "$APP_BASE/sitemap.xml" -o /tmp/sitemap.xml
          grep -F '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">' /tmp/sitemap.xml
          grep -F "/prompt/$slug" /tmp/sitemap.xml

      - name: Verify the production deployment and D1 seed
        env:
          PRODUCTION_BASE: https://promptstan-api.hhhh46529.workers.dev
        run: |
          set -euo pipefail

          health="$(curl -fsSL "$PRODUCTION_BASE/api/health")"
          prompts="$(curl -fsSL "$PRODUCTION_BASE/api/prompts")"
          printf '%s\n' "$health"
          printf '%s\n' "$prompts"

          HEALTH="$health" PROMPTS="$prompts" node <<'NODE'
          const health = JSON.parse(process.env.HEALTH || '{}');
          const prompts = JSON.parse(process.env.PROMPTS || '[]');
          if (health.launch_phase !== 'shareable-prompts-v1') {
            throw new Error('Production is not running the Phase 5 Worker');
          }
          if (!Array.isArray(prompts) || !prompts.some((prompt) => prompt.slug)) {
            throw new Error('Production D1 still has no prompt slug');
          }
          const prompt = prompts.find((item) => item.slug);
          require('fs').writeFileSync('/tmp/production-slug.txt', prompt.slug);
          NODE

          production_slug="$(cat /tmp/production-slug.txt)"
          curl -fsSL "$PRODUCTION_BASE/prompt/$production_slug" -o /tmp/production-prompt-page.html
          grep -F '<meta property="og:type" content="article"' /tmp/production-prompt-page.html
          grep -F '<meta property="og:image"' /tmp/production-prompt-page.html
          grep -F "/prompt/$production_slug" /tmp/production-prompt-page.html
          curl -fsSL "$PRODUCTION_BASE/sitemap.xml" | grep -F "/prompt/$production_slug"
