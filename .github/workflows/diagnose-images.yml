name: Diagnose PromptStan Images

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Verify and repair FLUX.2 preview image job
        env:
          PREVIEW_BASE: https://agent-recover-stuck-flux2-promptstan-api.hhhh46529.workers.dev
        run: |
          set -euo pipefail

          health="$(curl -fsS --retry 5 --retry-delay 3 "$PREVIEW_BASE/api/health")"
          printf '%s\n' "$health"
          printf '%s' "$health" | grep -F '"image_pipeline":"flux2-klein-recovery-v7"'

          for attempt in $(seq 1 6); do
            body="$(curl -fsS --max-time 600 --retry 2 --retry-delay 3 "$PREVIEW_BASE/api/health/images")"
            printf '%s\n' "$body" | tee live-image-health.json

            if printf '%s' "$body" | grep -F '"image_status":"ready"' >/dev/null \
              && printf '%s' "$body" | grep -F '"has_before":1' >/dev/null \
              && printf '%s' "$body" | grep -F '"has_after":1' >/dev/null; then
              echo 'The FLUX.2 Before/After repair is complete.'
              exit 0
            fi

            sleep 10
          done

          echo 'The FLUX.2 repair did not reach ready status.' >&2
          exit 1

      - name: Upload final image health
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: promptstan-image-diagnostics
          path: live-image-health.json
          if-no-files-found: warn
          retention-days: 1
