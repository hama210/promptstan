name: Diagnose PromptStan Images

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Capture current live image health
        run: |
          set -euo pipefail
          curl -fsS --retry 5 --retry-delay 3 https://promptstan-api.hhhh46529.workers.dev/api/health/images \
            | tee live-image-health.json

      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: promptstan-image-diagnostics
          path: live-image-health.json
          if-no-files-found: error
          retention-days: 1
