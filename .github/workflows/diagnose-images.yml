name: Diagnose PromptStan Images

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Check Cloudflare authentication
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          wranglerVersion: "4"
          command: whoami

      - name: Capture prompt table schema
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          npx wrangler d1 execute promptstan-db --remote --command "PRAGMA table_info(prompts);" > prompt-schema.txt 2>&1 || true
          cat prompt-schema.txt

      - name: Capture recent prompt image jobs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          npx wrangler d1 execute promptstan-db --remote --command "SELECT id, slug, image_status, substr(COALESCE(image_error, ''), 1, 500) AS image_error, before_image_url, after_image_url, created_at, updated_at FROM prompts ORDER BY id DESC LIMIT 20;" > recent-image-jobs.txt 2>&1 || true
          cat recent-image-jobs.txt

      - name: Capture image job totals
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          npx wrangler d1 execute promptstan-db --remote --command "SELECT COALESCE(image_status, 'null') AS image_status, COUNT(*) AS total FROM prompts GROUP BY image_status ORDER BY total DESC;" > image-job-totals.txt 2>&1 || true
          cat image-job-totals.txt

      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: promptstan-image-diagnostics
          path: |
            prompt-schema.txt
            recent-image-jobs.txt
            image-job-totals.txt
          if-no-files-found: error
          retention-days: 1
