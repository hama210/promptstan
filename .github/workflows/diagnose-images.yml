name: Diagnose PromptStan Images

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Inspect prompt table schema
        id: schema
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          wranglerVersion: "4"
          command: d1 execute promptstan-db --remote --json --command="PRAGMA table_info(prompts)"

      - name: Inspect recent prompt image jobs
        id: recent
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          wranglerVersion: "4"
          command: d1 execute promptstan-db --remote --json --command="SELECT id, slug, image_status, substr(COALESCE(image_error, ''), 1, 500) AS image_error, before_image_url, after_image_url, created_at, updated_at FROM prompts ORDER BY id DESC LIMIT 20"

      - name: Inspect image job totals
        id: totals
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          wranglerVersion: "4"
          command: d1 execute promptstan-db --remote --json --command="SELECT COALESCE(image_status, 'null') AS image_status, COUNT(*) AS total FROM prompts GROUP BY image_status ORDER BY total DESC"

      - name: Save diagnostics
        if: always()
        env:
          SCHEMA_OUTPUT: ${{ steps.schema.outputs.command-output }}
          SCHEMA_ERROR: ${{ steps.schema.outputs.command-stderr }}
          RECENT_OUTPUT: ${{ steps.recent.outputs.command-output }}
          RECENT_ERROR: ${{ steps.recent.outputs.command-stderr }}
          TOTALS_OUTPUT: ${{ steps.totals.outputs.command-output }}
          TOTALS_ERROR: ${{ steps.totals.outputs.command-stderr }}
        run: |
          printf '%s\n%s\n' "$SCHEMA_OUTPUT" "$SCHEMA_ERROR" > prompt-schema.txt
          printf '%s\n%s\n' "$RECENT_OUTPUT" "$RECENT_ERROR" > recent-image-jobs.txt
          printf '%s\n%s\n' "$TOTALS_OUTPUT" "$TOTALS_ERROR" > image-job-totals.txt
          cat recent-image-jobs.txt

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: promptstan-image-diagnostics
          path: |
            prompt-schema.txt
            recent-image-jobs.txt
            image-job-totals.txt
          if-no-files-found: error
          retention-days: 1
