name: Verify PromptStan Phase 6

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-content-safety:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Test rotation, similarity, and quality scoring
        run: node scripts/test-phase6.mjs

      - name: Test schedules, Iraq time, and batch limits
        run: node scripts/test-automation.mjs

      - name: Require hourly Cloudflare schedule checks
        run: |
          grep -F '"crons": ["0 * * * *"]' wrangler.jsonc

      - name: Build frontend
        run: npm run build

      - name: Validate Worker bundle
        run: npx wrangler deploy --dry-run

      - name: Wait for Phase 6 branch preview
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          branch_slug="$(printf '%s' "$HEAD_BRANCH" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9-]+/-/g; s/^-+|-+$//g')"
          APP_BASE="https://${branch_slug}-promptstan-api.hhhh46529.workers.dev"
          printf '%s' "$APP_BASE" >/tmp/app-base.txt

          for attempt in $(seq 1 36); do
            health="$(curl -fsSL "$APP_BASE/api/health" 2>/dev/null || true)"
            printf '%s\n' "$health"
            if printf '%s' "$health" | grep -F '"content_scale":"content-safety-v1"' >/dev/null \
              && printf '%s' "$health" | grep -F '"rotation_count":240' >/dev/null \
              && printf '%s' "$health" | grep -F '"automation":"dynamic-schedule-v1"' >/dev/null; then
              exit 0
            fi
            sleep 5
          done

          echo "Phase 6 preview did not become available at $APP_BASE" >&2
          exit 1

      - name: Verify protected Phase 6 endpoints
        run: |
          set -euo pipefail
          APP_BASE="$(cat /tmp/app-base.txt)"

          for endpoint in \
            '/api/admin/content-scale/status' \
            '/api/admin/automation/settings' \
            '/api/admin/automation/history' \
            '/api/admin/images/queue'; do
            status_code="$(curl -sS -o /tmp/unauthorized.json -w '%{http_code}' "$APP_BASE$endpoint")"
            test "$status_code" = "401"
            grep -F '"error":"Unauthorized"' /tmp/unauthorized.json
          done

          scan_code="$(curl -sS -X POST -o /tmp/scan-unauthorized.json -w '%{http_code}' "$APP_BASE/api/admin/content-scale/scan")"
          test "$scan_code" = "401"
          grep -F '"error":"Unauthorized"' /tmp/scan-unauthorized.json

          batch_code="$(curl -sS -X POST -H 'content-type: application/json' --data '{"limit":3}' -o /tmp/batch-unauthorized.json -w '%{http_code}' "$APP_BASE/api/admin/images/batch")"
          test "$batch_code" = "401"
          grep -F '"error":"Unauthorized"' /tmp/batch-unauthorized.json

      - name: Verify Phase 6 Admin UI is bundled
        run: |
          set -euo pipefail
          APP_BASE="$(cat /tmp/app-base.txt)"
          html="$(curl -fsSL "$APP_BASE/admin")"
          asset="$(printf '%s' "$html" | grep -oE 'src="[^"]+\.js"' | head -n 1 | cut -d'"' -f2)"
          test -n "$asset"

          case "$asset" in
            http*) asset_url="$asset" ;;
            /*) asset_url="$APP_BASE$asset" ;;
            *) asset_url="$APP_BASE/$asset" ;;
          esac

          curl -fsSL "$asset_url" -o /tmp/promptstan-app.js
          grep -F 'Duplicate Protection & Smart Rotation' /tmp/promptstan-app.js
          grep -F 'Publish next safe prompt' /tmp/promptstan-app.js
          grep -F 'Rotation combinations' /tmp/promptstan-app.js
          grep -F 'Bot Schedule & Image Batches' /tmp/promptstan-app.js
          grep -F 'Run image batch now' /tmp/promptstan-app.js
          grep -F 'Iraq/Kurdistan' /tmp/promptstan-app.js
          grep -F 'Save schedule' /tmp/promptstan-app.js
